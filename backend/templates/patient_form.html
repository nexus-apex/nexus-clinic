{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Patient | NexusClinic{% endblock %}
{% block page_title %}{% if editing %}Edit Patient{% else %}New Patient{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" value="{{ record.age|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Gender</label>
        <select name="gender">
          <option value="male" {% if record.gender == 'male' %}selected{% endif %}>Male</option>
          <option value="female" {% if record.gender == 'female' %}selected{% endif %}>Female</option>
          <option value="other" {% if record.gender == 'other' %}selected{% endif %}>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Blood Group</label>
        <input type="text" name="blood_group" value="{{ record.blood_group|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Allergies</label>
      <textarea name="allergies">{{ record.allergies|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Visit</label>
        <input type="date" name="last_visit" value="{{ record.last_visit|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Patient</button>
      <a href="/patients/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
