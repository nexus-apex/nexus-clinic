{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Prescription | NexusClinic{% endblock %}
{% block page_title %}{% if editing %}Edit Prescription{% else %}New Prescription{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Patient Name</label>
        <input type="text" name="patient_name" value="{{ record.patient_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Doctor</label>
        <input type="text" name="doctor" value="{{ record.doctor|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Diagnosis</label>
      <textarea name="diagnosis">{{ record.diagnosis|default:'' }}</textarea>
    </div>
    <div class="form-group">
      <label>Medications</label>
      <textarea name="medications">{{ record.medications|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Follow Up Date</label>
        <input type="date" name="follow_up_date" value="{{ record.follow_up_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Prescription</button>
      <a href="/prescriptions/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
